<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Bookings | Singapore Airport</title>
    <link rel="icon" href="plane-departure-solid.ico">
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-plane-departure me-2"></i>Singapore Airport
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="flights.html">Flights</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="history.html">My Bookings</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">My Booking History</h2>
        <button id="clearHistory" class="btn btn-outline-danger">
          <i class="fas fa-trash-alt me-2"></i>Clear History
        </button>
      </div>

      <div id="historyContainer" class="row g-4">
        <!-- Booking cards will be rendered here -->
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-gold" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Booking Details Modal -->
    <div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 rounded-4 overflow-hidden shadow">
          <div class="modal-header bg-primary-navy text-white py-3">
            <h5 class="modal-title"><i class="fas fa-ticket-alt me-2"></i>Booking Details</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-0" id="modalContent">
            <!-- Modal content will be dynamically generated -->
          </div>
        </div>
      </div>
    </div>

    <!-- Clear All History Modal -->
    <div class="modal fade" id="clearHistoryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow">
          <div class="modal-header bg-danger text-white py-3">
            <h5 class="modal-title">Clear All History</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <p class="mb-0">Are you sure you want to delete all booking history? <strong>This action cannot be undone.</strong></p>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="button" id="confirmClearAll" class="btn btn-danger px-4">Clear All</button>
          </div>
        </div>
      </div>
    </div>

   <!-- Footer -->
    <footer class="mt-auto">
      <div class="container text-center">
        <h4 class="mb-4">Singapore Airport Group</h4>
        <div class="social-links mb-4">
          <a href="#" class="text-white mx-2"
            ><i class="fab fa-facebook-f"></i
          ></a>
          <a href="#" class="text-white mx-2"><i class="fab fa-twitter"></i></a>
          <a href="#" class="text-white mx-2"
            ><i class="fab fa-instagram"></i
          ></a>
        </div>
        <p style="color: rgb(160, 174, 192)" class="small">
          &copy; 2026 Singapore Airport Website. All rights reserved.
        </p>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("historyContainer");
        const clearBtn = document.getElementById("clearHistory");
        const modalContent = document.getElementById("modalContent");
        const bookingModal = new bootstrap.Modal(document.getElementById('bookingModal'));

        const renderHistory = () => {
          const history = JSON.parse(localStorage.getItem("bookingHistory")) || [];
          container.innerHTML = "";

          if (history.length === 0) {
            container.innerHTML = `
                <div class="col-12 text-center py-5">
                    <i class="fas fa-calendar-times display-1 text-muted mb-4"></i>
                    <h3>No bookings yet</h3>
                    <p class="text-muted">Once you book a flight, it will appear here.</p>
                    <a href="flights.html" class="btn btn-gold mt-3">Explore Flights</a>
                </div>
            `;
            clearBtn.style.display = "none";
            return;
          }

          clearBtn.style.display = "block";
          history.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

          history.forEach((booking) => {
            const card = document.createElement("div");
            card.className = "col-md-6 col-lg-4";
            card.setAttribute("data-ref", booking.reference);
            card.innerHTML = `
                <div class="card border-0 shadow-sm rounded-4 h-100 transition-hover position-relative overflow-hidden">
                  <button class="btn btn-sm btn-outline-danger position-absolute delete-booking" 
                          data-ref="${booking.reference}" 
                          style="top: 12px; right: 12px; width: 32px; height: 32px; padding: 0; z-index: 10; font-size: 12px; transition: all 0.2s ease; border-radius: 50%;">
                    <i class="fas fa-trash-alt"></i>
                  </button>
                  <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 pe-4">
                      <span class="badge bg-light text-primary-navy fw-bold border" style="color: var(--primary-navy) !important;">${booking.reference}</span>
                      <small class="text-muted">${new Date(booking.timestamp).toLocaleDateString()}</small>
                    </div>
                    <h5 class="card-title mb-1">${booking.passengerName}</h5>
                    <p class="card-text text-muted small mb-3">
                      <i class="fas fa-plane-departure me-1"></i> ${booking.route}
                    </p>
                    <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-auto">
                      <div class="small">
                        <span class="text-muted">Date:</span> <strong>${booking.date}</strong>
                      </div>
                      <button class="btn btn-sm btn-outline-gold view-details" data-ref="${booking.reference}">
                        View Details
                      </button>
                    </div>
                  </div>
                  <!-- Delete Confirmation Strip -->
                  <div class="delete-confirm-strip bg-light border-top px-3 overflow-hidden" style="max-height: 0; transition: max-height 0.3s ease-out;">
                    <div class="d-flex justify-content-between align-items-center py-3">
                      <span class="small fw-bold text-danger">Delete this booking?</span>
                      <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-link text-muted text-decoration-none cancel-delete">Cancel</button>
                        <button class="btn btn-sm btn-danger confirm-delete" data-ref="${booking.reference}">Yes, Delete</button>
                      </div>
                    </div>
                  </div>
                </div>
            `;
            container.appendChild(card);
          });

          // Add event listeners for details buttons
          document.querySelectorAll('.view-details').forEach(btn => {
            btn.addEventListener('click', () => {
              const ref = btn.dataset.ref;
              const booking = history.find(b => b.reference === ref);
              if (booking) showDetails(booking);
            });
          });

          // Handle delete button click (show strip)
          document.querySelectorAll('.delete-booking').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const card = btn.closest('.card');
              const strip = card.querySelector('.delete-confirm-strip');
              strip.style.maxHeight = '100px';
              btn.style.opacity = '0';
              btn.style.pointerEvents = 'none';
            });
          });

          // Handle cancel delete
          document.querySelectorAll('.cancel-delete').forEach(btn => {
            btn.addEventListener('click', () => {
              const card = btn.closest('.card');
              const strip = card.querySelector('.delete-confirm-strip');
              const deleteBtn = card.querySelector('.delete-booking');
              strip.style.maxHeight = '0';
              deleteBtn.style.opacity = '1';
              deleteBtn.style.pointerEvents = 'auto';
            });
          });

          // Handle confirm delete
          document.querySelectorAll('.confirm-delete').forEach(btn => {
            btn.addEventListener('click', () => {
              const ref = btn.dataset.ref;
              let currentHistory = JSON.parse(localStorage.getItem("bookingHistory")) || [];
              currentHistory = currentHistory.filter(b => b.reference !== ref);
              localStorage.setItem("bookingHistory", JSON.stringify(currentHistory));
              renderHistory();
            });
          });
        };

        const showDetails = (booking) => {
          modalContent.innerHTML = `
            <div class="p-4">
              <div class="row g-4">
                <div class="col-lg-8">
                  <div class="mb-4">
                    <h6 class="text-muted text-uppercase small fw-bold mb-3">Passenger Information</h6>
                    <div class="row g-3">
                      <div class="col-6">
                        <label class="text-muted small d-block">${booking.passengerCount > 1 ? 'Lead Passenger' : 'Full Name'}</label>
                        <span>${booking.passengerName || '—'}</span>
                      </div>
                      <div class="col-6">
                        <label class="text-muted small d-block">Email</label>
                        <span style="word-break: break-all;">${booking.email || '—'}</span>
                      </div>
                      <div class="col-6">
                        <label class="text-muted small d-block">Phone</label>
                        <span>${booking.phone || '—'}</span>
                      </div>
                      <div class="col-6">
                        <label class="text-muted small d-block">Seat Class</label>
                        <span class="text-capitalize">${booking.seatClass || '—'}</span>
                      </div>
                      <div class="col-6">
                        <label class="text-muted small d-block">Passengers</label>
                        <span>${booking.passengerCount || '1'} Person(s)</span>
                      </div>
                    </div>
                  </div>
                  <div class="mb-4">
                    <h6 class="text-muted text-uppercase small fw-bold mb-3">Flight Summary</h6>
                    <div class="bg-light p-3 rounded-3">
                      <div class="d-flex justify-content-between mb-2">
                        <strong>${booking.airline} (${booking.flightNumber})</strong>
                        <span class="text-gold fw-bold">S$ ${booking.totalPrice.toLocaleString()}</span>
                      </div>
                      <div class="small text-muted mb-1">${booking.route}</div>
                      <div class="small text-muted border-bottom pb-2 mb-2">Departure: ${booking.date} at ${booking.departureTime || 'TBA'}</div>
                      ${booking.passengerCount > 1 ? `
                        <div class="small text-muted d-flex justify-content-between">
                          <span>Price Breakdown:</span>
                          <span>${booking.priceBreakdown}</span>
                        </div>
                      ` : `
                        <div class="small text-muted d-flex justify-content-between">
                          <span>Total Paid:</span>
                          <span>S$ ${booking.totalPrice.toLocaleString()}</span>
                        </div>
                      `}
                    </div>
                  </div>
                  <div>
                    <h6 class="text-muted text-uppercase small fw-bold mb-2">Meal Preference</h6>
                    <p class="bg-light p-3 rounded-3 small mb-0">
                      ${booking.mealPreference || 'No Preference'}
                    </p>
                  </div>
                </div>
                <div class="col-lg-4 text-center border-lg-start pt-4 pt-lg-0">
                  <div class="py-3">
                    <h6 class="text-muted text-uppercase small fw-bold mb-4">Boarding Pass QR</h6>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${booking.reference}" 
                         alt="QR Code" class="img-fluid mb-3 rounded border p-2 shadow-sm" style="width: 150px;">
                    <div class="fw-bold text-primary-navy mt-2">${booking.reference}</div>
                    <small class="text-muted">Show this at the gate</small>
                  </div>
                </div>
              </div>
            </div>
          `;
          bookingModal.show();
        };

        const clearAllModal = new bootstrap.Modal(document.getElementById('clearHistoryModal'));
        const confirmClearAllBtn = document.getElementById('confirmClearAll');

        clearBtn.addEventListener("click", () => {
          clearAllModal.show();
        });

        confirmClearAllBtn.addEventListener("click", () => {
          localStorage.removeItem("bookingHistory");
          renderHistory();
          clearAllModal.hide();
        });

        renderHistory();
      });
    </script>
    <style>
      .btn-outline-gold {
        color: var(--accent-gold);
        border-color: var(--accent-gold);
      }
      .btn-outline-gold:hover {
        background-color: var(--accent-gold);
        color: var(--primary-navy);
      }
      .card .delete-booking {
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .card:hover .delete-booking {
        opacity: 1;
      }
    </style>
  </body>
</html>
