<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Bookings | Singapore Airport</title>
    <link rel="icon" href="plane-departure-solid.ico">
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-plane-departure me-2"></i>Singapore Airport
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="flights.html">Flights</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="history.html">My Bookings</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">My Booking History</h2>
        <button id="clearHistory" class="btn btn-outline-danger">
          <i class="fas fa-trash-alt me-2"></i>Clear History
        </button>
      </div>

      <div id="historyContainer" class="row">
        <!-- Booking cards will be rendered here -->
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-gold" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </div>

   <!-- Footer -->
    <footer class="mt-auto">
      <div class="container text-center">
        <h4 class="mb-4">Singapore Airport Group</h4>
        <div class="social-links mb-4">
          <a href="#" class="text-white mx-2"
            ><i class="fab fa-facebook-f"></i
          ></a>
          <a href="#" class="text-white mx-2"><i class="fab fa-twitter"></i></a>
          <a href="#" class="text-white mx-2"
            ><i class="fab fa-instagram"></i
          ></a>
        </div>
        <p style="color: rgb(160, 174, 192)" class="small">
          &copy; 2026 Singapore Airport Website. All rights reserved.
        </p>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("historyContainer");
        const clearBtn = document.getElementById("clearHistory");

        const renderHistory = () => {
          const history =
            JSON.parse(localStorage.getItem("bookingHistory")) || [];
          container.innerHTML = "";

          if (history.length === 0) {
            container.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <i class="fas fa-calendar-times display-1 text-muted mb-4"></i>
                            <h3>No bookings yet</h3>
                            <p class="text-muted">Once you book a flight, it will appear here.</p>
                            <a href="index.html" class="btn btn-gold mt-3">Search Flights</a>
                        </div>
                    `;
            clearBtn.style.display = "none";
            return;
          }

          clearBtn.style.display = "block";

          // Sort by most recent first
          history.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

          history.forEach((booking) => {
            const card = document.createElement("div");
            card.className = "col-md-6 col-lg-4";
            card.innerHTML = `
                        <div class="history-card">
                            <div class="d-flex justify-content-between mb-3">
                                <span class="badge bg-primary-navy" style="background-color: var(--primary-navy);">${booking.reference}</span>
                                <span class="text-gold fw-bold">S$ ${booking.totalPrice.toLocaleString()}</span>
                            </div>
                            <h5 class="mb-1">${booking.passengerName}</h5>
                            <p class="text-muted small mb-3">${booking.route}</p>
                            <div class="row g-0 small border-top pt-3">
                                <div class="col-6 text-muted">
                                    <i class="fas fa-calendar me-1"></i> ${booking.date}
                                </div>
                                <div class="col-6 text-end text-muted text-capitalize">
                                    <i class="fas fa-couch me-1"></i> ${booking.seatClass}
                                </div>
                            </div>
                        </div>
                    `;
            container.appendChild(card);
          });
        };

        clearBtn.addEventListener("click", () => {
          if (
            confirm(
              "Are you sure you want to clear your entire booking history?",
            )
          ) {
            localStorage.removeItem("bookingHistory");
            renderHistory();
          }
        });

        renderHistory();
      });
    </script>
  </body>
</html>
