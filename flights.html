<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Available Flights | Singapore Airport</title>
    <link rel="icon" href="plane-departure-solid.ico" />
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-plane-departure me-2"></i>Singapore Airport
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="flights.html">Flights</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="history.html">My Bookings</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Filter Header Section -->
    <div
      class="bg-primary-navy py-4 mb-5"
      style="background-color: var(--primary-navy)"
    >
      <div class="container">
        <div class="row">
          <div class="col-12 text-white mb-4">
            <h2 id="searchTitle">Available Flights</h2>
            <p style="color: rgb(160, 174, 192)
;" class="mb-0" id="searchSubtitle">
              Showing results for your search
            </p>
          </div>
        </div>
        <!-- Filters Row -->
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label small">From Date</label>
            <input
              type="date"
              class="form-control form-control-sm"
              id="filterFromDate"
            />
          </div>
          <div class="col-md-3">
            <label class="form-label small">To Date</label>
            <input
              type="date"
              class="form-control form-control-sm"
              id="filterToDate"
            />
          </div>
          <div class="col-md-3">
            <label class="form-label small">Airline</label>
            <select class="form-select form-select-sm" id="airlineFilter">
              <option value="all">All Airlines</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label small">Sort By</label>
            <select class="form-select form-select-sm" id="sortSelect">
              <option value="priceLow">Price: Low to High</option>
              <option value="priceHigh">Price: High to Low</option>
              <option value="timeEarly">Departure: Earliest</option>
              <option value="timeLate">Departure: Latest</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Results Container -->
    <div class="container">
      <div class="row">
        <div class="col-12" id="flightsContainer">
          <div class="text-center py-5">
            <div class="spinner-border text-gold" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="mt-auto">
      <div class="container text-center">
        <h4 class="mb-4">Singapore Airport Group</h4>
        <div class="social-links mb-4">
          <a href="#" class="text-white mx-2"
            ><i class="fab fa-facebook-f"></i
          ></a>
          <a href="#" class="text-white mx-2"><i class="fab fa-twitter"></i></a>
          <a href="#" class="text-white mx-2"
            ><i class="fab fa-instagram"></i
          ></a>
        </div>
        <p style="color: rgb(160, 174, 192)" class="small">
          &copy; 2026 Singapore Airport Website. All rights reserved.
        </p>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="flights-data.js"></script>
    <script src="flights.js"></script>
  </body>
</html>
